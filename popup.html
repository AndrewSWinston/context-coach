<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ContextCoach</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      width: 280px;
      background: #0f0f0f;
      color: #e5e5e5;
    }

    .header {
      padding: 14px 16px 10px;
      border-bottom: 1px solid #2a2a2a;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header-title {
      font-size: 14px;
      font-weight: 600;
      color: #fff;
    }

    .status-block {
      padding: 16px;
      border-bottom: 1px solid #2a2a2a;
    }

    .token-count {
      font-size: 28px;
      font-weight: 700;
      color: #fff;
      line-height: 1;
    }

    .token-label {
      font-size: 11px;
      color: #888;
      margin-top: 2px;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      margin-top: 10px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }

    .message {
      margin-top: 10px;
      font-size: 12px;
      color: #ccc;
      line-height: 1.5;
    }

    .breakdown {
      padding: 12px 16px;
      border-bottom: 1px solid #2a2a2a;
    }

    .breakdown-title {
      font-size: 11px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }

    .breakdown-row {
      display: flex;
      justify-content: space-between;
      padding: 3px 0;
      font-size: 12px;
      color: #ccc;
    }

    .breakdown-row .value {
      color: #fff;
      font-weight: 500;
    }

    .footer {
      padding: 10px 16px;
      font-size: 11px;
      color: #555;
      text-align: center;
    }

    .no-data {
      padding: 24px 16px;
      text-align: center;
      color: #666;
      font-size: 12px;
      line-height: 1.6;
    }

    .api-key-section {
      padding: 12px 16px;
      border-top: 1px solid #2a2a2a;
    }

    .api-key-section label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }

    .api-key-row {
      display: flex;
      gap: 6px;
    }

    .api-key-input {
      flex: 1;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 4px;
      color: #e5e5e5;
      font-size: 11px;
      padding: 5px 8px;
      outline: none;
    }

    .api-key-input:focus {
      border-color: #555;
    }

    .api-key-save {
      background: #333;
      border: none;
      border-radius: 4px;
      color: #e5e5e5;
      font-size: 11px;
      cursor: pointer;
      padding: 5px 10px;
      white-space: nowrap;
    }

    .api-key-save:hover { background: #444; }

    .api-key-status {
      font-size: 11px;
      color: #22c55e;
      margin-top: 4px;
      min-height: 14px;
    }

    .upgrade-section {
      padding: 10px 16px;
      border-top: 1px solid #2a2a2a;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .upgrade-label {
      font-size: 11px;
      color: #ccc;
      line-height: 1.4;
    }

    .upgrade-label small {
      display: block;
      color: #666;
      font-size: 10px;
      margin-top: 1px;
    }

    /* Silver/inactive state (default — backend not live) */
    .upgrade-btn {
      background: linear-gradient(180deg, #3a3a3a, #2a2a2a);
      border: 1px solid #555;
      border-radius: 20px;
      color: #aaa;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      padding: 6px 14px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .upgrade-btn:hover { background: linear-gradient(180deg, #444, #333); color: #ddd; border-color: #777; }

    /* Green active state — add class "live" when backend is deployed */
    .upgrade-btn.live {
      background: linear-gradient(180deg, #22c55e, #16a34a);
      border-color: #16a34a;
      color: #fff;
    }

    .upgrade-btn.live:hover { background: linear-gradient(180deg, #16a34a, #15803d); }

    /* Modal overlay */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.visible { display: flex; }

    .modal {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 20px 18px;
      width: 230px;
      text-align: center;
    }

    .modal-title {
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 8px;
    }

    .modal-body {
      font-size: 12px;
      color: #999;
      line-height: 1.5;
      margin-bottom: 14px;
    }

    .modal-close {
      background: #333;
      border: none;
      border-radius: 4px;
      color: #e5e5e5;
      font-size: 12px;
      cursor: pointer;
      padding: 6px 16px;
    }

    .modal-close:hover { background: #444; }
  </style>
</head>
<body>
  <div class="header">
    <span>📊</span>
    <span class="header-title">ContextCoach</span>
  </div>

  <div id="main-content">
    <div class="no-data">
      Open a conversation on<br>claude.ai to see token data.
    </div>
  </div>

  <div class="api-key-section" id="api-key-section">
    <label>Anthropic API Key</label>
    <div class="api-key-row">
      <input type="password" class="api-key-input" id="api-key-input" placeholder="sk-ant-..." />
      <button class="api-key-save" id="api-key-save">Save</button>
    </div>
    <div class="api-key-status" id="api-key-status"></div>
  </div>

  <div class="upgrade-section">
    <span class="upgrade-label">
      New Chat summaries
      <small id="usage-count">Loading…</small>
    </span>
    <button class="upgrade-btn" id="upgrade-btn">Upgrade ↗</button>
  </div>

  <!-- "Not available yet" modal -->
  <div class="modal-overlay" id="upgrade-modal">
    <div class="modal">
      <div class="modal-title">Coming soon</div>
      <div class="modal-body">
        Paid plans with included summaries aren't available yet.<br><br>
        For now, add your own Anthropic API key above — each summary costs ~$0.001.
      </div>
      <button class="modal-close" id="modal-close">OK</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
