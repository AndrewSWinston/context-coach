<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ContextCoach</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      width: 280px;
      background: #0f0f0f;
      color: #e5e5e5;
    }

    .header {
      padding: 14px 16px 10px;
      border-bottom: 1px solid #2a2a2a;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header-title {
      font-size: 14px;
      font-weight: 600;
      color: #fff;
    }

    .status-block {
      padding: 16px;
      border-bottom: 1px solid #2a2a2a;
    }

    .token-count {
      font-size: 28px;
      font-weight: 700;
      color: #fff;
      line-height: 1;
    }

    .token-label {
      font-size: 11px;
      color: #888;
      margin-top: 2px;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      margin-top: 10px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }

    .message {
      margin-top: 10px;
      font-size: 12px;
      color: #ccc;
      line-height: 1.5;
    }

    .breakdown {
      padding: 12px 16px;
      border-bottom: 1px solid #2a2a2a;
    }

    .breakdown-title {
      font-size: 11px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }

    .breakdown-row {
      display: flex;
      justify-content: space-between;
      padding: 3px 0;
      font-size: 12px;
      color: #ccc;
    }

    .breakdown-row .value {
      color: #fff;
      font-weight: 500;
    }

    .footer {
      padding: 10px 16px;
      font-size: 11px;
      color: #555;
      text-align: center;
    }

    .no-data {
      padding: 24px 16px;
      text-align: center;
      color: #666;
      font-size: 12px;
      line-height: 1.6;
    }

  </style>
</head>
<body>
  <div class="header">
    <span>📊</span>
    <span class="header-title">ContextCoach</span>
  </div>

  <div id="main-content">
    <div class="no-data">
      Open a conversation on<br>claude.ai to see token data.
    </div>
  </div>

  <!-- [API key input, usage-count upgrade section, and upgrade modal were
       removed 2026-04-14 along with the Haiku summarize path. See tag
       v0.1.0-pre-trim or session log 13 to restore if needed.] -->

  <script src="popup.js"></script>
</body>
</html>
